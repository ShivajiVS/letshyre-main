<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>letshyre</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-lite-blue: #f6faff;
        --secondary-sky-blue: #6296ef;
        --brand-blue: #2563eb;
        --slate-900: #0f172a;
        --font-primary02: "Merriweather", serif;
      }

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      .letshyre-boot-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background-color: var(--primary-lite-blue);
        position: fixed;
        top: 0;
        left: 0;
      }

      /* Geometric Morph Loader */
      .morph-loader {
        width: 40px;
        height: 40px;
        background-color: var(--brand-blue);
        margin-bottom: 30px;
        animation: morph 2s infinite ease-in-out;
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
      }

      .letshyre-brand {
        font-family: var(--font-primary02);
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--slate-900);
        position: relative;
        overflow: hidden;
      }

      /* Text Shimmer Effect */
      .letshyre-brand span {
        color: var(--brand-blue);
        background: linear-gradient(
          to right,
          var(--brand-blue) 0%,
          #93c5fd 50%,
          var(--brand-blue) 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: text-shimmer 2s linear infinite;
      }

      .letshyre-status {
        margin-top: 15px;
        font-family: "Segoe UI", sans-serif;
        font-size: 0.9rem;
        color: #94a3b8;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      /* Animations */
      @keyframes morph {
        0% {
          transform: scale(1) rotate(0deg);
          border-radius: 4px;
        }
        25% {
          transform: scale(1.2) rotate(90deg);
          border-radius: 50%;
          background-color: var(--secondary-sky-blue);
        }
        50% {
          transform: scale(1) rotate(180deg);
          border-radius: 4px;
        }
        75% {
          transform: scale(1.2) rotate(270deg);
          border-radius: 50%;
          background-color: var(--brand-blue);
        }
        100% {
          transform: scale(1) rotate(360deg);
          border-radius: 4px;
        }
      }

      @keyframes text-shimmer {
        to {
          background-position: 200% center;
        }
      }

      /* Subtle enter animation for the whole content */
      .content-fade {
        animation: fadeIn 0.6s ease-out forwards;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="letshyre-boot-container">
        <div class="content-fade">
          <div class="morph-loader"></div>

          <div class="letshyre-brand">Lets<span>hyre</span></div>

          <div class="letshyre-status">Syncing assets</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
