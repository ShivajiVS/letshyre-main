<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO (fallback — overridden per-page by react-helmet-async) -->
    <title>LetsHyre — AI Hiring Platform for Notice-Period Talent | Smart Recruiting</title>
    <meta name="description" content="LetsHyre automates resume evaluation, AI-driven interviews, and candidate verification for modern HR teams. Hire notice-period talent 40% faster with 100% AI-verified profiles." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://letshyre.com/" />

    <!-- Open Graph fallback -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LetsHyre" />
    <meta property="og:title" content="LetsHyre — AI Hiring Platform for Notice-Period Talent" />
    <meta property="og:description" content="Automate resume screening, AI interviews, and candidate verification. Build your dream team 40% faster." />
    <meta property="og:url" content="https://letshyre.com/" />
    <meta property="og:image" content="https://letshyre.com/og-cover.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#2563eb" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      .lh-boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100%;
        background: radial-gradient(ellipse at 50% 40%, #eef4ff 0%, #f8fafc 60%);
        position: fixed;
        inset: 0;
        animation: lh-fadeIn 0.5s ease-out both;
      }

      .lh-boot-logo {
        height: 48px;
        width: auto;
        object-fit: contain;
        user-select: none;
        pointer-events: none;
      }

      .lh-dots {
        display: flex;
        gap: 8px;
        margin-top: 32px;
      }

      .lh-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background-color: #2563eb;
        animation: lh-bounce 1.4s ease-in-out infinite both;
      }

      .lh-dot:nth-child(1) { animation-delay: 0s; }
      .lh-dot:nth-child(2) { animation-delay: 0.16s; }
      .lh-dot:nth-child(3) { animation-delay: 0.32s; }

      .lh-tagline {
        margin-top: 20px;
        font-family: "Segoe UI", system-ui, sans-serif;
        font-size: 0.82rem;
        color: #94a3b8;
        letter-spacing: 0.04em;
        animation: lh-fadeIn 0.6s 0.4s ease-out both;
      }

      @keyframes lh-bounce {
        0%, 80%, 100% {
          transform: scale(0.4);
          opacity: 0.3;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes lh-fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @media (max-width: 480px) {
        .lh-boot-logo { height: 38px; }
        .lh-dot { width: 6px; height: 6px; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="lh-boot">
        <img src="/logo2.png" alt="Letshyre" class="lh-boot-logo" />
        <div class="lh-dots">
          <div class="lh-dot"></div>
          <div class="lh-dot"></div>
          <div class="lh-dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
